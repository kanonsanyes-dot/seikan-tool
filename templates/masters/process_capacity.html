{% extends 'base.html' %}{%- block h1 -%}工程キャパマスタ{%- endblock -%}{% block content %}
<form class="card p-3 mb-3 row g-2" method="post" action="{{ url_for('masters.add_capacity') }}"><div class="col"><input class="form-control" name="process_name" placeholder="工程"></div><div class="col"><input class="form-control" type="date" name="work_date"></div><div class="col"><input class="form-control" type="number" step="0.1" name="available_hours" placeholder="稼働h"></div><div class="col"><input class="form-control" type="number" name="workers" placeholder="人員"></div><div class="col"><input class="form-control" type="number" name="capacity_quantity" placeholder="処理数"></div><div class="col-auto"><button class="btn btn-primary">追加</button></div></form>
<div class="card p-3 table-responsive"><table class="table table-sm"><tr><th>日付</th><th>工程</th><th>稼働h</th><th>人員</th><th>処理数</th><th>操作</th></tr>{% for c in capacities %}<tr><td>{{c.work_date}}</td><td>{{c.process_name}}</td><td>{{c.available_hours}}</td><td>{{c.workers}}</td><td>{{c.capacity_quantity}}</td><td><form method="post" action="{{ url_for('masters.delete_capacity', id=c.capacity_id) }}"><button class="btn btn-sm btn-danger">削除</button></form></td></tr>{% endfor %}</table></div>{% endblock %}
