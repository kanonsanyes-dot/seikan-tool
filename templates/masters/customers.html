{% extends 'base.html' %}{% block h1 %}出荷先マスタ{% endblock %}{% block content %}
<form class="card p-3 mb-3 row g-2" method="post" action="{{ url_for('masters.add_customer') }}"><div class="col"><input class="form-control" name="customer_name" placeholder="出荷先名"></div><div class="col-auto"><button class="btn btn-primary">追加</button></div></form>
<div class="card p-3"><table class="table table-sm"><tr><th>ID</th><th>客先名</th><th>使用中</th><th>操作</th></tr>{% for c in customers %}<tr><form method="post" action="{{ url_for('masters.edit_customer', id=c.customer_id) }}"><td>{{c.customer_id}}</td><td><input class="form-control form-control-sm" name="customer_name" value="{{c.customer_name}}"></td><td><input type="checkbox" name="is_active" value="1" {% if c.is_active %}checked{% endif %}></td><td><button class="btn btn-sm btn-success">保存</button></form><form class="d-inline" method="post" action="{{ url_for('masters.delete_customer', id=c.customer_id) }}"><button class="btn btn-sm btn-danger">削除</button></form></td></tr>{% endfor %}</table></div>{% endblock %}
