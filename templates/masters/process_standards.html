{% extends 'base.html' %}{%- block h1 -%}品名工程標準マスタ{%- endblock -%}{% block content %}
<form class="card p-3 mb-3 row g-2" method="post" action="{{ url_for('masters.add_standard') }}"><div class="col"><input class="form-control" name="product_name" placeholder="品名"></div><div class="col"><input class="form-control" name="process_product_name" placeholder="工程品名"></div><div class="col"><input class="form-control" name="process_name" placeholder="工程"></div><div class="col"><input class="form-control" type="number" name="process_order" placeholder="順"></div><div class="col"><input class="form-control" type="number" step="0.01" name="standard_time_min" placeholder="分/個"></div><div class="col"><input class="form-control" type="number" name="daily_capacity" placeholder="日産"></div><div class="col-auto"><button class="btn btn-primary">追加</button></div></form>
<div class="card p-3 table-responsive"><table class="table table-sm"><tr><th>品名</th><th>工程品名</th><th>工程</th><th>順</th><th>分/個</th><th>日産</th><th>操作</th></tr>{% for s in standards %}<tr><td>{{s.product_name}}</td><td>{{s.process_product_name}}</td><td>{{s.process_name}}</td><td>{{s.process_order}}</td><td>{{s.standard_time_min}}</td><td>{{s.daily_capacity}}</td><td><form method="post" action="{{ url_for('masters.delete_standard', id=s.standard_id) }}"><button class="btn btn-sm btn-danger">削除</button></form></td></tr>{% endfor %}</table></div>{% endblock %}
