{% extends 'base.html' %}{% block h1 %}工程進捗表{% endblock %}{% block content %}
<form class="card p-3 mb-3 row g-2"><div class="col-md-3"><input class="form-control" name="process" placeholder="工程で絞込" value="{{process or ''}}"></div><div class="col-auto"><button class="btn btn-primary">表示</button></div></form>
<div class="card p-3 table-responsive"><table class="table table-sm table-hover"><tr><th>受注ID</th><th>客先</th><th>品名</th><th>数量</th><th>工程</th><th>予定</th><th>実績終了</th><th>状態</th><th>部署</th><th>備考</th><th>保存</th></tr>{% for r in rows %}<tr><form method="post" action="{{ url_for('progress.update', id=r.progress_id) }}"><td>{{r.order_id}}</td><td>{{r.order.customer}}</td><td>{{r.product_name}}</td><td>{{r.quantity}}</td><td>{{r.process_name}}</td><td>{{r.start_date}}〜{{r.end_date}}</td><td><input class="form-control form-control-sm" type="date" name="actual_end_date" value="{{r.actual_end_date or ''}}"></td><td><select class="form-select form-select-sm" name="status">{% for s in ['未着手','進行中','完了','遅延'] %}<option {% if r.status==s %}selected{% endif %}>{{s}}</option>{% endfor %}</select></td><td><input class="form-control form-control-sm" name="department" value="{{r.department or ''}}"></td><td><input class="form-control form-control-sm" name="remarks" value="{{r.remarks or ''}}"></td><td><button class="btn btn-sm btn-success">保存</button></td></form></tr>{% endfor %}</table></div>{% endblock %}
