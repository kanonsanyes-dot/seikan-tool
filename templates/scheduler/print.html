<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>Schedule Print</title><style>body{font-family:sans-serif}.card{border:1px solid #999;padding:8px;margin:4px}.grid{display:grid;grid-template-columns:80px 160px 160px 120px 120px 80px;gap:4px}.head{font-weight:bold;background:#eee}</style></head><body><h1>SeikanTool 工程スケジュール</h1><p>出力日時</p><div class="grid head"><div>受注ID</div><div>品名</div><div>客先</div><div>工程</div><div>期間</div><div>状態</div></div>{% for s in schedules %}<div class="grid"><div>{{s.order_id}}</div><div>{{s.order.product_name}}</div><div>{{s.order.customer}}</div><div>{{s.process_name}}</div><div>{{s.start_date}}〜{{s.end_date}}</div><div>{{s.status}}</div></div>{% endfor %}<h2>次回確認事項</h2><div style="border:1px solid #999;height:100px"></div></body></html>
