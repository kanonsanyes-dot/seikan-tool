{% extends 'base.html' %}
{% block head %}<link rel="stylesheet" href="{{ url_for('static', filename='css/scheduler.css') }}">{% endblock %}
{%- block h1 -%}工程スケジューラー{%- endblock -%}
{% block content %}
<div class="card p-3 mb-3 scheduler-toolbar">
  <div class="row g-2 align-items-end">
    <div class="col-md-2"><label>対象月</label><input type="month" id="month" class="form-control"></div>
    <div class="col-md-2"><label>客先</label><input id="customer" class="form-control" placeholder="任意"></div>
    <div class="col-md-2"><label>品名</label><input id="product" class="form-control" placeholder="任意"></div>
    <div class="col-md-2 form-check mt-4"><input class="form-check-input" type="checkbox" id="snap" checked><label class="form-check-label" for="snap">スナップON</label></div>
    <div class="col-auto"><button class="btn btn-primary" id="btn-load">表示更新</button></div>
    <div class="col-auto"><a class="btn btn-success" href="{{ url_for('scheduler.export_excel') }}">Excel出力</a></div>
    <div class="col-auto"><button class="btn btn-outline-danger" id="btn-pdf">PDF出力</button></div>
  </div>
  <hr>
  <div class="row g-2 align-items-center">
    <div class="col-auto">
      <button class="btn btn-warning" id="btn-generate-all">
        <i class="bi bi-lightning-fill me-1"></i>全受注スケジュール一括生成
      </button>
    </div>
    <div class="col-auto">
      <div class="form-check form-switch mt-1">
        <input class="form-check-input" type="checkbox" id="toggleLoad">
        <label class="form-check-label" for="toggleLoad">負荷率表示</label>
      </div>
    </div>
    <div class="col-auto ms-3 border-start ps-3">
      <form id="generateForm" class="row g-2">
        <div class="col-md-auto"><select id="orderSelect" class="form-select form-select-sm" style="min-width:320px"><option value="">工程カードを生成する受注を選択</option>{% for o in orders %}<option value="{{o.order_id}}" {% if o.order_id in scheduled_order_ids %}class="text-muted"{% endif %}>#{{o.order_id}} {{o.product_name}} / {{o.customer}} / {{o.ship_date}}{% if o.order_id in scheduled_order_ids %} ✓{% endif %}</option>{% endfor %}</select></div>
        <div class="col-auto"><button class="btn btn-sm btn-outline-info">選択受注の工程生成</button></div>
      </form>
    </div>
  </div>
</div>
<div class="card p-3"><div id="summary" class="mb-2 text-muted">表示対象を読み込みます。</div><div class="scheduler-scroll"><div id="timeline" class="timeline"></div></div><div id="loadWarnings" class="mt-3"></div></div>
{% endblock %}
{% block scripts %}<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script><script src="{{ url_for('static', filename='js/scheduler.js') }}"></script>{% endblock %}
