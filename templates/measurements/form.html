{% extends "base.html" %}
{% block title %}{% if m %}測定記録 編集{% else %}測定記録 新規登録{% endif %} - SeikanTool{% endblock %}
{% block h1 %}{% if m %}測定記録 編集{% else %}測定記録 新規登録{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-body">
        <form method="post">
          <input type="hidden" name="work_order_id" value="{{ work_order_id or '' }}">
          <input type="hidden" name="process_id" value="{{ process_id or '' }}">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">品名 <span class="text-danger">*</span></label>
              <input type="text" name="product_name" class="form-control" required
                     value="{{ m.product_name if m else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">ロット番号</label>
              <input type="text" name="lot_no" class="form-control"
                     value="{{ m.lot_no if m else '' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">測定日</label>
              <input type="date" name="measured_date" class="form-control"
                     value="{{ m.measured_date.strftime('%Y-%m-%d') if m and m.measured_date else '' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">測定項目</label>
              <input type="text" name="measurement_item" class="form-control"
                     value="{{ m.measurement_item if m else '' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">判定結果</label>
              <select name="result" class="form-select">
                <option value="">選択</option>
                {% for r in result_list %}
                <option value="{{ r }}" {% if m and m.result == r %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">検査者</label>
              <input type="text" name="inspector" class="form-control"
                     value="{{ m.inspector if m else '' }}">
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">ファイルパス / 所在</label>
              <input type="text" name="file_path" class="form-control font-monospace"
                     placeholder="\\server\share\files\xxx.xlsx"
                     value="{{ m.file_path if m else '' }}">
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">保存場所メモ</label>
              <textarea name="storage_note" class="form-control" rows="2">{{ m.storage_note if m else '' }}</textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">備考</label>
              <textarea name="remarks" class="form-control" rows="2">{{ m.remarks if m else '' }}</textarea>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-info text-white">
              <i class="bi bi-check-lg me-1"></i>{% if m %}更新{% else %}登録{% endif %}
            </button>
            <a href="{{ url_for('measurements.list_measurements') }}" class="btn btn-outline-secondary">キャンセル</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
